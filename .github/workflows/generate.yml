name: Сгенерировать персонажа

on:
  push:
    branches: [main]
    paths: [inbox/**]
  workflow_dispatch:
    inputs:
      inbox_path:
        description: "Путь к файлу в inbox (повторная обработка после сбоя)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: generate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    # защита от зацикливания: результат конвейера — тоже push в inbox/ (удаление файла)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Настроить identity git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Определить файлы для обработки
        id: files
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            files="${{ inputs.inbox_path }}"
          else
            files=$(git diff --name-only HEAD^ HEAD -- inbox/ | tr '\n' ' ')
          fi
          if [ -z "$files" ]; then
            echo "Нет файлов inbox/ для обработки — выход." >&2
            exit 1
          fi
          echo "list=$files" >> "$GITHUB_OUTPUT"

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Обработать анкету
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Обработай файлы ${{ steps.files.outputs.list }} по инструкции
            .github/prompts/generate.md
          claude_args: |
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep"
            --dangerously-skip-permissions
