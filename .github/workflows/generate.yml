name: Сгенерировать персонажа

on:
  push:
    branches: [main]
    paths: [inbox/**]
  workflow_dispatch:
    inputs:
      inbox_path:
        description: "Путь к файлу в inbox (через пробел, если несколько)"
        required: true
        type: string

permissions:
  contents: write
  actions: write
  id-token: write

concurrency:
  group: generate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # claude-code-action не поддерживает событие push ("Unsupported event type: push").
  # Эта джоба ловит push в inbox/ и только переотправляет запуск как workflow_dispatch
  # с уже вычисленным списком файлов — саму генерацию делает джоба generate ниже.
  dispatch:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Запустить обработку как workflow_dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(git diff --name-only HEAD^ HEAD -- inbox/ | tr '\n' ' ')
          if [ -z "$files" ]; then
            echo "Нет файлов inbox/ для обработки — выход." >&2
            exit 0
          fi
          gh workflow run generate.yml --ref "${{ github.ref_name }}" -f inbox_path="$files"

  generate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Настроить identity git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Обработать анкету
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Обработай файлы ${{ github.event.inputs.inbox_path }} по инструкции
            .github/prompts/generate.md
          claude_args: |
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep"
            --dangerously-skip-permissions
