name: Тесты

on:
  push:
    branches: [main]
    paths-ignore: ["characters/**", "inbox/**"]
  pull_request:
    branches: [main]
    paths-ignore: ["characters/**", "inbox/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install -r requirements.txt ruff

      - name: ruff
        run: ruff check .

      - name: pytest
        run: pytest
